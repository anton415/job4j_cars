spring.application.name=job4j_cars

app.hibernate.config=hibernate-test.cfg.xml

spring.datasource.url=jdbc:h2:mem:job4j_cars;MODE=PostgreSQL;DATABASE_TO_UPPER=false;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.liquibase.change-log=classpath:db/dbchangelog.xml

spring.h2.console.enabled=true
spring.thymeleaf.cache=false
