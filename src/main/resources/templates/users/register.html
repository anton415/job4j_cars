<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация</title>
</head>
<body>
<nav>
    <a th:href="@{/}">Главная</a>
    <span th:if="${currentUser == null}">
        <a th:href="@{/users/login}">Войти</a>
        <a th:href="@{/users/register}">Регистрация</a>
    </span>
    <span th:if="${currentUser != null}">
        <span th:text="${currentUser.name}">Пользователь</span>
        <a th:href="@{/users/logout}">Выйти</a>
    </span>
</nav>
<main>
    <h1>Регистрация</h1>
    <p th:if="${message != null}" th:text="${message}"></p>
    <form th:action="@{/users/register}" th:object="${newUser}" method="post">
        <div>
            <label for="name">Имя</label>
            <input type="text" id="name" th:field="*{name}" required>
        </div>
        <div>
            <label for="email">Почта</label>
            <input type="email" id="email" th:field="*{email}" required>
        </div>
        <div>
            <label for="password">Пароль</label>
            <input type="password" id="password" th:field="*{password}" required>
        </div>
        <button type="submit">Зарегистрироваться</button>
    </form>
</main>
</body>
</html>
