<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Создать объявление</title>
</head>
<body>
<nav>
    <a th:href="@{/posts}">Объявления</a>
    <span th:if="${currentUser == null}">
        <a th:href="@{/users/login}">Войти</a>
        <a th:href="@{/users/register}">Регистрация</a>
    </span>
    <span th:if="${currentUser != null}">
        <span th:text="${currentUser.name}">Пользователь</span>
        <a th:href="@{/users/logout}">Выйти</a>
    </span>
</nav>
<main>
    <p>
        <a th:href="@{/posts}">К списку объявлений</a>
    </p>
    <h1>Создать объявление</h1>
    <p th:if="${message != null}" th:text="${message}"></p>
    <form th:action="@{/posts/create}" th:object="${post}" method="post" enctype="multipart/form-data">
        <div>
            <label for="title">Название</label>
            <input type="text" id="title" th:field="*{title}" pattern=".*\S.*" required>
        </div>
        <div>
            <label for="description">Описание</label>
            <textarea id="description" th:field="*{description}" rows="5"></textarea>
        </div>
        <div>
            <label for="price">Цена</label>
            <input type="number" id="price" th:field="*{price}" min="0.01" step="0.01" required>
        </div>
        <h2>Автомобиль</h2>
        <div>
            <label for="brand">Марка</label>
            <select id="brand" th:field="*{brand}" required>
                <option value="">Выберите марку</option>
                <option th:each="brand : ${carBrands}" th:value="${brand}" th:text="${brand}"></option>
            </select>
        </div>
        <div>
            <label for="model">Модель</label>
            <select id="model" th:field="*{model}" required>
                <option value="">Выберите модель</option>
                <option th:each="carModel : ${carModels}" th:value="${carModel}" th:text="${carModel}"></option>
            </select>
        </div>
        <div>
            <label for="year">Год выпуска</label>
            <select id="year" th:field="*{year}" required>
                <option value="">Выберите год</option>
                <option th:each="productionYear : ${productionYears}"
                        th:value="${productionYear}"
                        th:text="${productionYear}">
                </option>
            </select>
        </div>
        <div>
            <label for="bodyType">Кузов</label>
            <select id="bodyType" th:field="*{bodyType}" required>
                <option value="">Выберите кузов</option>
                <option th:each="bodyType : ${bodyTypes}" th:value="${bodyType}" th:text="${bodyType}"></option>
            </select>
        </div>
        <div>
            <label for="engineType">Двигатель</label>
            <select id="engineType" th:field="*{engineType}" required>
                <option value="">Выберите двигатель</option>
                <option th:each="engineType : ${engineTypes}" th:value="${engineType}" th:text="${engineType}"></option>
            </select>
        </div>
        <div>
            <label for="transmission">Коробка передач</label>
            <select id="transmission" th:field="*{transmission}" required>
                <option value="">Выберите коробку передач</option>
                <option th:each="transmission : ${transmissions}"
                        th:value="${transmission}"
                        th:text="${transmission}">
                </option>
            </select>
        </div>
        <div>
            <label for="mileage">Пробег</label>
            <input type="number" id="mileage" th:field="*{mileage}" min="0" required>
        </div>
        <div>
            <label for="photo">Фото</label>
            <input type="file" id="photo" name="photo" accept="image/*">
        </div>
        <button type="submit">Создать</button>
    </form>
</main>
</body>
</html>
