databaseChangeLog:
  - changeSet:
      id: 001-create-cars-table
      author: job4j
      changes:
        - createTable:
            tableName: cars
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: brand
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: model
                  type: varchar(128)
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
